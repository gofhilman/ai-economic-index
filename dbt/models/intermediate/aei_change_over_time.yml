version: 2

models:
  - name: int_aei_task_shares_by_version
    description: >
      Canonical task-share series across AEI report releases, with task names normalized
      and v3/v4 renormalized after excluding the not_classified bucket.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - report_version
              - task_name
    columns:
      - name: report_version
        data_type: string
        description: AEI report version label from v1 through v4.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['v1', 'v2', 'v3', 'v4']
      - name: report_release_date
        data_type: date
        description: Public release date for the report represented by the row.
        data_tests:
          - not_null
      - name: task_name
        data_type: string
        description: Lowercased and trimmed O*NET task label.
        data_tests:
          - not_null
      - name: pct
        data_type: float64
        description: Task share percentage for the report version after required normalization.
        data_tests:
          - not_null

  - name: int_aei_collaboration_shares_by_version
    description: >
      Canonical collaboration-share series across AEI report releases, with interaction
      labels normalized to underscore-separated names and report-specific normalization applied.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - report_version
              - interaction_type
    columns:
      - name: report_version
        data_type: string
        description: AEI report version label from v1 through v4.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['v1', 'v2', 'v3', 'v4']
      - name: report_release_date
        data_type: date
        description: Public release date for the report represented by the row.
        data_tests:
          - not_null
      - name: interaction_type
        data_type: string
        description: Normalized collaboration interaction label.
        data_tests:
          - not_null
      - name: pct
        data_type: float64
        description: Collaboration share percentage for the report version after normalization.
        data_tests:
          - not_null

  - name: int_aei_task_to_soc_group
    description: >
      Mapping table from normalized O*NET task names to SOC major-group titles used to
      add occupational context to task-level AEI analysis.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - task_name
              - soc_group
    columns:
      - name: task_name
        data_type: string
        description: Lowercased and trimmed O*NET task label.
        data_tests:
          - not_null
      - name: soc_group
        data_type: string
        description: SOC major-group title associated with the task.
        data_tests:
          - not_null
