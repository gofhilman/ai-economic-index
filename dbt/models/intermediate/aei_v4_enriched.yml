version: 2

models:
  - name: int_aei_enriched_v4_scaffold_rows
    description: >
      Normalized and enriched V4 Claude.ai AEI base rows, including geography
      standardization, geo names, zero-filled usage rows, and external working-age
      population and GDP-derived metrics for supported countries and US states.

  - name: int_aei_enriched_v4_usage_metrics
    description: >
      Derived V4 usage metrics computed from the enriched scaffold, including
      usage per capita, usage per capita index, and notebook-parity usage tiers.

  - name: int_aei_enriched_v4_pct_index_metrics
    description: >
      Derived V4 percentage index metrics for onet task, collaboration, and
      request facets, benchmarked against global or US country baselines.

  - name: int_aei_enriched_v4_soc_metrics
    description: >
      Derived V4 SOC distribution metrics computed from onet task shares using
      the shared task-to-SOC mapping table.

  - name: int_aei_enriched_v4_automation_metrics
    description: >
      Derived V4 automation and augmentation percentage metrics computed from
      collaboration counts for eligible geographies.
