version: 2

models:
  - name: mart_aei_work_soc_outcomes
    description: >
      SOC-group reporting mart for the February 5-12, 2026 Claude.ai AEI slice,
      filtered to global work use cases. Updated to use variance propagation 
      (1.96 * Standard Error) for calculating Confidence Intervals (CIs) instead 
      of averaging pre-built bounds. 

      Continuous time metrics (human_only_time, human_with_ai_time) now use the
      task-level median as the central tendency rather than the mean to reduce
      sensitivity to outliers; the SOC-level value is a weighted average of 
      task-level medians. The ai_autonomy metric continues to use the 
      task-level mean. All ratio calculations (e.g., time_savings_ratio) utilize 
      `safe_divide` to prevent division by zero errors.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - geo_id
              - date_start
              - date_end
              - platform_and_product
              - use_case
              - soc_group
    columns:
      - name: geo_id
        data_type: string
        description: Geographic identifier fixed to `GLOBAL` for this reporting slice.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['GLOBAL']
      - name: geo_name
        data_type: string
        description: Human-readable geography label for the global slice.
        data_tests:
          - not_null
      - name: geography
        data_type: string
        description: Geography grain from the source mart, expected to be `global`.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['global']
      - name: date_start
        data_type: date
        description: Start date of the AEI reporting window.
        data_tests:
          - not_null
      - name: date_end
        data_type: date
        description: End date of the AEI reporting window.
        data_tests:
          - not_null
      - name: platform_and_product
        data_type: string
        description: Source platform/product label carried through from the enriched mart.
        data_tests:
          - not_null
      - name: use_case
        data_type: string
        description: Use-case filter applied to the reporting mart, fixed to `work`.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['work']
      - name: soc_group
        data_type: string
        description: SOC major-group title, normalized to match existing reporting marts.
        data_tests:
          - not_null
      - name: mapped_task_count
        data_type: int64
        description: Count of distinct mapped O*NET tasks with non-zero work usage in the SOC group.
        data_tests:
          - not_null
      - name: work_use_case_count
        data_type: float64
        description: Sum of work-use-case conversation counts across mapped tasks in the SOC group.
        data_tests:
          - not_null
      - name: work_use_case_pct
        data_type: float64
        description: SOC share of mapped global work-use-case conversations.
        data_tests:
          - not_null
      - name: task_success_observation_count
        data_type: float64
        description: Estimated number of work observations contributing to task success.
        data_tests:
          - not_null
      - name: successful_task_count
        data_type: float64
        description: Estimated number of successful work observations in the SOC group.
        data_tests:
          - not_null
      - name: task_success_rate
        data_type: float64
        description: Estimated work-filtered task success share for the SOC group.
      - name: ai_autonomy_observation_count
        data_type: float64
        description: Estimated number of work observations contributing to the AI autonomy metric.
        data_tests:
          - not_null
      - name: ai_autonomy_score
        data_type: float64
        description: >
          Work-weighted AI autonomy score for the SOC group, computed as a weighted
          average of task-level means.
      - name: ai_autonomy_score_ci_lower
        data_type: float64
        description: >
          Lower 95% confidence bound for the AI autonomy score, derived from
          propagated task-level variance (Score - 1.96 * SE).
      - name: ai_autonomy_score_ci_upper
        data_type: float64
        description: >
          Upper 95% confidence bound for the AI autonomy score, derived from
          propagated task-level variance (Score + 1.96 * SE).
      - name: human_only_time_observation_count
        data_type: float64
        description: Estimated number of work observations contributing to the human-only time metric.
        data_tests:
          - not_null
      - name: human_only_time_median
        data_type: float64
        description: >
          Work-weighted median time for a human to complete the task without AI,
          computed as a weighted average of task-level medians.
      - name: human_only_time_median_ci_lower
        data_type: float64
        description: >
          Lower 95% confidence bound for human-only time, derived from
          propagated task-level variance.
      - name: human_only_time_median_ci_upper
        data_type: float64
        description: >
          Upper 95% confidence bound for human-only time, derived from
          propagated task-level variance.
      - name: human_with_ai_time_observation_count
        data_type: float64
        description: Estimated number of work observations contributing to the human-with-AI time metric.
        data_tests:
          - not_null
      - name: human_with_ai_time_median
        data_type: float64
        description: >
          Work-weighted median time for a human to complete the task with AI assistance,
          computed as a weighted average of task-level medians.
      - name: human_with_ai_time_median_ci_lower
        data_type: float64
        description: >
          Lower 95% confidence bound for human-with-AI time, derived from
          propagated task-level variance.
      - name: human_with_ai_time_median_ci_upper
        data_type: float64
        description: >
          Upper 95% confidence bound for human-with-AI time, derived from
          propagated task-level variance.
      - name: time_savings_ratio
        data_type: float64
        description: >
          Ratio defined as `1 - (human_with_ai_time_median / human_only_time_median)`.
      - name: time_savings_ratio_ci_lower
        data_type: float64
        description: >
          Conservative lower confidence bound for time savings, derived from 
          crossing the new propagated median bounds.
      - name: time_savings_ratio_ci_upper
        data_type: float64
        description: >
          Optimistic upper confidence bound for time savings, derived from 
          crossing the new propagated median bounds.
      - name: human_only_ability_observation_count
        data_type: float64
        description: Estimated number of work observations contributing to human-only ability.
        data_tests:
          - not_null
      - name: requires_ai_task_count
        data_type: float64
        description: Estimated number of work observations that could not be done without AI.
        data_tests:
          - not_null
      - name: human_only_ability_requires_ai_rate
        data_type: float64
        description: Estimated share of work observations that could not be completed without AI.